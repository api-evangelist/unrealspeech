    URLs, with selectable voice, bitrate, speed, and pitch.
- aid: unrealspeech:unrealspeech-stream-api
  name: Unreal Speech Stream API
  tags:
  - Text to Speech
  - Streaming
  - Low Latency
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.unrealspeech.com/reference/stream
