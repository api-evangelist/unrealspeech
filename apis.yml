  - url: openapi/unrealspeech-openapi.yml
    type: OpenAPI
  - url: collections/unrealspeech.postman_collection.json
    type: PostmanCollection
  - url: collections/unrealspeech.opencollection.json
    type: OpenCollection
  description: Low-latency HTTP streaming synthesis for short text (up to 1,000
    characters), returning audio bytes directly in the response - typically in
    around 0.3 seconds - for time-sensitive uses like chatbots and voice agents.
    This is HTTP chunked streaming, not a WebSocket.
