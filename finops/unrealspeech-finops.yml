description: >-
  FinOps view of Unreal Speech spend. Unreal Speech is a hosted, commercial
  text-to-speech API with no self-hosted option, so all cost is a vendor invoice.
  Billing combines a monthly subscription tier with a per-character consumption
  meter: each plan bundles an included monthly character allowance, and volume
  beyond it is billed as overage (about $8 per 1,000,000 characters at enterprise
  scale) or absorbed by moving to a higher tier. A free allowance (~250K
  characters/month) covers evaluation. Roughly 750 characters equals one minute
  of synthesized audio, so cost tracks closely to minutes/hours of audio
  produced.
notes: >-
  Per-unit overage rates and plan allowances reflect the published pricing page
  at the time of review and can change; verify at
  https://app.unrealspeech.com/pricing during reconciliation.
