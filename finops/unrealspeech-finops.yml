meters:
- name: characters_synthesized
  description: Characters of text synthesized to speech, metered monthly against the plan allowance and billed as overage beyond it.
  unit: characters
  aggregation: sum
  dimensions:
  - account
  - endpoint
  - voice
- name: plan_subscription
  description: Fixed monthly subscription fee for the selected plan tier.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
- name: overage_characters
  description: Characters synthesized beyond the plan's included monthly allowance, billed per million.
  unit: characters
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track characters synthesized per endpoint and voice; convert to minutes of audio (~750 characters per minute) to relate spend to output.
- name: Allocation
  description: Attribute character consumption to workloads or teams by API key/account so TTS spend maps to internal cost centers.
- name: Optimization
  description: Right-size the plan tier to actual monthly character volume; use /synthesisTasks for long-form to batch cost-effectively; trim or cache repeated text to avoid re-synthesizing the same content; select bitrate no higher than needed.
- name: Accountability
  description: Assign an owner per account/key and review monthly character usage against the plan allowance to avoid overage surprises.
